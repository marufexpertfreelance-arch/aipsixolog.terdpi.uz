<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="person" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bg)" width="400" height="500"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="40" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="320" cy="400" r="60" fill="#06b6d4" opacity="0.1"/>
  <circle cx="350" cy="150" r="30" fill="#0284c7" opacity="0.15"/>
  
  <!-- Person silhouette -->
  <g transform="translate(200, 280)">
    <!-- Head -->
    <circle cx="0" cy="-80" r="50" fill="url(#person)"/>
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="70" ry="90" fill="url(#person)"/>
    <!-- Arms -->
    <ellipse cx="-60" cy="0" rx="25" ry="80" fill="url(#person)" transform="rotate(-20 -60 0)"/>
    <ellipse cx="60" cy="0" rx="25" ry="80" fill="url(#person)" transform="rotate(20 60 0)"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#0284c7">
    Xudoyorova Marvarid
  </text>
  <text x="200" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">
    Psixolog
  </text>
</svg>
